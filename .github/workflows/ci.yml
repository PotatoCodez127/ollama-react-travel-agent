name: CI Pipeline

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest black ruff
          pip install -e .

      - name: Run Black Code Formatting Audit
        run: black --check .

      - name: Run Ruff Linter Scan
        run: ruff check .

      - name: Run Unit Test Suite via Pytest
        run: pytest